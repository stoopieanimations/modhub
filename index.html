<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModHub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#e9e9e9;
}

/* Navigation */
.navbar{
    background:#666;
    display:flex;
    align-items:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    padding:16px 20px;
    font-weight:bold;
    font-size:16px;
    border-right:1px solid rgba(255,255,255,0.15);
    transition:0.3s;
}

.navbar a:hover{
    background:#777;
}

.navbar a.active{
    background:#7b7b7b;
}

/* Main Content */
.container{
    padding:10px;
}

.section-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:12px;
    color:#000;
}

.mods-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:40px;
    margin-bottom:20px;
}

/* Mod Card */
.mod-card{
    width:130px;
    height:100px;
    background:linear-gradient(to right,#8f14d9,#d7b0f0);
    border:2px solid #9a49d8;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:18px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
    transition:transform .2s;
}

.mod-card:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<nav class="navbar">
    <a href="#">modhub</a>
    <a href="#" class="active">home</a>
    <a href="#">trending</a>
    <a href="#">mod of the week</a>
    <a href="#">search</a>
    <a href="#">shortcut to google</a>
</nav>

<div class="container">

    <h2 class="section-title">latest mods</h2>

    <div class="mods-grid">
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
    </div>

    <h2 class="section-title">featured mods</h2>

    <div class="mods-grid">
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
    </div>

</div>

</body>
</html>
