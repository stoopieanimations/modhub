<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModHub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#e9e9e9;
}

/* NAVBAR */
.navbar{
    background:#666;
    display:flex;
    align-items:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    padding:16px 20px;
    font-weight:bold;
    border-right:1px solid rgba(255,255,255,0.15);
    transition:.3s;
}

.navbar a:hover{
    background:#777;
}

.navbar a.active{
    background:#7b7b7b;
}

/* SUBMIT BUTTON */
.submit-btn{
    margin-left:auto;
    margin-right:15px;
    padding:10px 18px;
    background:#8f14d9;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#a63cf0;
}

/* PAGE CONTENT */
.container{
    padding:10px;
}

.section-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:12px;
    color:black;
}

.mods-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:40px;
    margin-bottom:20px;
}

/* MOD CARDS */
.mod-card{
    width:130px;
    height:100px;
    background:linear-gradient(to right,#8f14d9,#d7b0f0);
    border:2px solid #9a49d8;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:18px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
    transition:.2s;
    overflow:hidden;
    padding:10px;
}

.mod-card:hover{
    transform:scale(1.05);
}

.mod-card a{
    color:white;
    text-decoration:none;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
}

.modal-content{
    background:white;
    width:450px;
    max-width:90%;
    margin:100px auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

.close{
    float:right;
    font-size:28px;
    cursor:pointer;
}

.modal h2{
    margin-bottom:15px;
}

.modal input,
.modal textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

.modal button[type="submit"]{
    width:100%;
    padding:12px;
    background:#8f14d9;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.modal button[type="submit"]:hover{
    background:#a63cf0;
}
</style>
</head>

<body>

<nav class="navbar">
    <a href="index.html">modhub</a>

    <a href="#" class="active"
       onclick="location.reload(); return false;">
       home
    </a>

    <a href="#">trending</a>
    <a href="#">mod of the week</a>
    <a href="#">search</a>

    <a href="https://google.com" target="_blank">
        shortcut to google
    </a>

    <button class="submit-btn"
            onclick="openSubmitModal()">
        Submit Mod
    </button>
</nav>

<div class="container">

    <h2 class="section-title">latest mods</h2>

    <div class="mods-grid" id="latestMods">
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
    </div>

    <h2 class="section-title">featured mods</h2>

    <div class="mods-grid">
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
        <div class="mod-card">mod blank</div>
    </div>

</div>

<!-- SUBMIT MOD MODAL -->
<div id="submitModal" class="modal">
    <div class="modal-content">

        <span class="close"
              onclick="closeSubmitModal()">
              &times;
        </span>

        <h2>Submit a Mod</h2>

        <form id="modForm">

            <input
                id="modName"
                type="text"
                placeholder="Mod Name"
                required>

            <textarea
                id="modDescription"
                rows="5"
                placeholder="Description"
                required></textarea>

            <input
                id="modLink"
                type="url"
                placeholder="Download Link">

            <button type="submit">
                Submit
            </button>

        </form>

    </div>
</div>

<script>
function openSubmitModal(){
    document.getElementById("submitModal").style.display = "block";
}

function closeSubmitModal(){
    document.getElementById("submitModal").style.display = "none";
}

window.onclick = function(event){
    const modal = document.getElementById("submitModal");

    if(event.target === modal){
        modal.style.display = "none";
    }
};

function createModCard(mod){

    const card = document.createElement("div");
    card.className = "mod-card";
    card.title = mod.description;

    if(mod.link && mod.link.trim() !== ""){

        const link = document.createElement("a");
        link.href = mod.link;
        link.target = "_blank";
        link.textContent = mod.name;

        card.appendChild(link);

    }else{

        card.textContent = mod.name;

    }

    return card;
}

function loadMods(){

    const savedMods =
        JSON.parse(localStorage.getItem("mods")) || [];

    const latestMods =
        document.getElementById("latestMods");

    savedMods.forEach(mod => {
        latestMods.prepend(
            createModCard(mod)
        );
    });
}

document
.getElementById("modForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const mod = {
        name: document.getElementById("modName").value,
        description: document.getElementById("modDescription").value,
        link: document.getElementById("modLink").value
    };

    const mods =
        JSON.parse(localStorage.getItem("mods")) || [];

    mods.unshift(mod);

    localStorage.setItem(
        "mods",
        JSON.stringify(mods)
    );

    document
        .getElementById("latestMods")
        .prepend(createModCard(mod));

    alert("Mod submitted successfully!");

    closeSubmitModal();

    this.reset();
});

loadMods();
</script>

</body>
</html>
