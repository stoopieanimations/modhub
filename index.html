<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModHub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#e9e9e9;
}

/* NAVBAR */
.navbar{
    background:#666;
    display:flex;
    align-items:center;
    flex-wrap:wrap;
}

.navbar a{
    color:white;
    text-decoration:none;
    padding:16px 20px;
    font-weight:bold;
    border-right:1px solid rgba(255,255,255,0.15);
    transition:.3s;
}

.navbar a:hover{
    background:#777;
}

.navbar a.active{
    background:#7b7b7b;
}

/* SUBMIT BUTTON */
.submit-btn{
    margin-left:auto;
    margin-right:15px;
    padding:10px 18px;
    background:#8f14d9;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#a63cf0;
}

/* PAGE CONTENT */
.container{
    padding:15px;
}

.section-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:15px;
    color:black;
}

.mods-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:25px;
    margin-bottom:30px;
}

/* MOD CARD */
.mod-card{
    width:130px;
    height:100px;
    background:linear-gradient(to right,#8f14d9,#d7b0f0);
    border:2px solid #9a49d8;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:18px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
    transition:.2s;
    overflow:hidden;
    padding:10px;
}

.mod-card:hover{
    transform:scale(1.05);
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    z-index:1000;
}

.modal-content{
    background:white;
    width:450px;
    max-width:90%;
    margin:120px auto;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    text-align:center;
}

.close{
    float:right;
    font-size:28px;
    cursor:pointer;
}

.discord-link{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:#5865F2;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.discord-link:hover{
    background:#4752c4;
}

.empty-message{
    color:#666;
    font-style:italic;
    padding:20px 0;
}
</style>
</head>

<body>

<nav class="navbar">
    <a href="index.html">modhub</a>

    <a href="#" class="active"
       onclick="location.reload(); return false;">
       home
    </a>

    <a href="#">trending</a>
    <a href="#">mod of the week</a>
    <a href="#">search</a>

    <a href="https://google.com" target="_blank">
        shortcut to google
    </a>

    <button class="submit-btn" onclick="openSubmitModal()">
        Submit Mod
    </button>
</nav>

<div class="container">

    <h2 class="section-title">latest mods</h2>

    <div class="mods-grid" id="latestMods"></div>

    <div class="empty-message">
        No mods have been posted yet.
    </div>

    <h2 class="section-title">featured mods</h2>

    <div class="mods-grid"></div>

    <div class="empty-message">
        No featured mods yet.
    </div>

</div>

<!-- SUBMIT MOD MODAL -->
<div id="submitModal" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeSubmitModal()">
            &times;
        </span>

        <h2>Submit a Mod</h2>

        <p style="margin-top:15px; line-height:1.6;">
            To submit a mod, please join our Discord server and post your submission there.
        </p>

        <a class="discord-link"
           href="https://discord.gg/Et9W6VNjfb"
           target="_blank">
           Join the Discord Server
        </a>

    </div>
</div>

<script>
function openSubmitModal() {
    document.getElementById("submitModal").style.display = "block";
}

function closeSubmitModal() {
    document.getElementById("submitModal").style.display = "none";
}

window.onclick = function(event) {
    const modal = document.getElementById("submitModal");

    if (event.target === modal) {
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
